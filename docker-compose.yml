# SQLite needs no database server, so there's nothing to run for the DB.
# This file only provides optional local S3-compatible storage (MinIO) for gallery uploads.
# You can skip it entirely until you wire up media uploads.
services:
  minio:
    image: minio/minio:latest
    container_name: lovestory_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  minio_data:
